<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Do ZERO à 1ª Música">
  <title>Do ZERO à 1ª Música</title>
  <defs>
    <linearGradient id="d0a1-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#443468"/>
      <stop offset="1" stop-color="#2D2249"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="15" fill="url(#d0a1-bg)"/>

  <!--
    Ukulele em contorno (line art). A direção veio de um estudo no Gemini, que ficou
    mais elegante que a silhueta cheia anterior, mas ali estava girado 45 graus, cheio
    de trastes e tarraxas, e fora das cores da marca. Aqui: mesma ideia, inclinação
    curta, zero detalhe supérfluo, hex exatos do brandbook.
    Regra de ouro: base índigo, detalhe rosa. A boca é o único elemento preenchido.
  -->
  <g transform="rotate(-13 32 34)" fill="none" stroke="#F5F4F7" stroke-linecap="round" stroke-linejoin="round">
    <!-- headstock -->
    <rect x="27.4" y="6" width="9.2" height="8.6" rx="2.6" stroke-width="2.5"/>
    <!-- braço, curto -->
    <path d="M29.7 14v16.5M34.3 14v16.5" stroke-width="2.5"/>
    <!-- corpo: bojo de cima menor, bojo de baixo maior, cintura curta -->
    <path stroke-width="2.8" d="M32 29.5c7.8 0 11.6 3.9 11.6 7.9 0 3-2.7 3.9-2.7 6.1 0 2.6 5.1 4.4 5.1 8.8C46 58 39.6 60.6 32 60.6S18 58 18 52.3c0-4.4 5.1-6.2 5.1-8.8 0-2.2-2.7-3.1-2.7-6.1 0-4 3.8-7.9 11.6-7.9z"/>
    <!-- cavalete -->
    <rect x="26.9" y="53.4" width="10.2" height="3" rx="1.5" stroke-width="1.7"/>
  </g>

  <!-- a boca, único elemento cheio: o detalhe rosa da marca -->
  <g transform="rotate(-13 32 34)">
    <circle cx="32" cy="43" r="5.6" fill="#E87A85"/>
  </g>

  <!-- as 4 cordas passam por cima da boca, como no instrumento de verdade -->
  <g transform="rotate(-13 32 34)" stroke="#F5F4F7" stroke-width=".9" stroke-linecap="round">
    <path d="M30.3 9.5v44M31.4 9.5v44M32.6 9.5v44M33.7 9.5v44"/>
  </g>
</svg>
