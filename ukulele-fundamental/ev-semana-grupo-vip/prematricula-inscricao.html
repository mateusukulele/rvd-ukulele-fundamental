    <style>
        .cascade-section { display: none; opacity: 0; }
        .cascade-section.animate-reveal { display: block; animation: cascadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

<body class="font-sans text-slate-700 bg-brand-light antialiased selection:bg-brand-orange selection:text-white">
    <noscript><iframe src="https://serversidegtm.comotocarukulele.com/ns.html?id=GTM-PDH6QGB2" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <div id="capture-modal" class="fixed inset-0 z-[9999] hidden items-center justify-center bg-brand-dark/95 px-4 backdrop-blur-md opacity-0 transition-opacity duration-300">
        <div class="w-full max-w-md rounded-[40px] bg-white p-6 md:p-10 shadow-2xl transform scale-95 transition-transform duration-300" id="capture-content">
            <h3 class="font-display text-xl md:text-2xl font-extrabold text-brand-dark mb-2 text-center">Falta muito pouco!</h3>
            <p class="text-slate-500 text-xs md:text-sm mb-6 md:mb-8 text-center leading-tight">Preencha seus dados para receber o link de acesso ao Grupo VIP no WhatsApp.</p>
            <form onsubmit="handleCapture(event)" class="space-y-4 md:space-y-5">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-2">Nome Completo *</label>
                    <input required type="text" id="lead-nome" class="w-full px-4 py-3 rounded-2xl bg-slate-50 border border-slate-200 focus:border-brand-blue focus:outline-none text-sm" placeholder="Ex: Mateus Augusto" oninput="document.getElementById('erro-nome').classList.add('hidden')">
                    <p id="erro-nome" class="mt-1 hidden text-[10px] font-bold text-red-500 ml-2">Por favor, insira nome e sobrenome.</p>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-2">Melhor E-mail *</label>
                    <input required type="email" id="lead-email" class="w-full px-4 py-3 rounded-2xl bg-slate-50 border border-slate-200 focus:border-brand-blue focus:outline-none text-sm" placeholder="seu@email.com">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-2">WhatsApp com DDD *</label>
                    <div class="flex rounded-2xl border border-slate-200 bg-slate-50 focus-within:border-brand-blue overflow-hidden">
                        <div class="bg-slate-100 border-r border-slate-200 flex items-center px-4"><span class="text-sm font-bold text-slate-700">+55</span></div>
                        <input required type="tel" id="lead-whatsapp" class="w-full px-4 py-3 bg-transparent focus:outline-none text-slate-700 font-medium text-sm" placeholder="(00) 00000-0000" oninput="document.getElementById('erro-tel').classList.add('hidden')">
                    </div>
                    <p id="erro-tel" class="mt-1 hidden text-[10px] font-bold text-red-500 ml-2">Número inválido.</p>
                </div>
                <button type="submit" id="btn-submit" class="w-full bg-brand-cta text-white py-4 rounded-2xl font-display font-extrabold uppercase shadow-lg hover:-translate-y-1 transition-all mt-2 text-sm">Liberar Vaga no Grupo VIP</button>
            </form>
        </div>
    </div>

    <script>
        // Modal & Animações
        function abrirCaptura() { document.getElementById('capture-modal').classList.remove('hidden'); document.getElementById('capture-modal').classList.add('flex'); setTimeout(() => document.getElementById('capture-modal').classList.remove('opacity-0'), 10); }
        
        // Máscara WhatsApp
        const waInput = document.getElementById('lead-whatsapp');
        waInput.addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.substring(0, 11);
            if (v.length > 2) v = '(' + v.substring(0,2) + ') ' + v.substring(2);
            if (v.length > 7) v = v.substring(0,9) + '-' + v.substring(9);
            e.target.value = v;
        });

        // Validação Final
        function handleCapture(event) {
            event.preventDefault();
            const nome = document.getElementById('lead-nome').value.trim();
            const email = document.getElementById('lead-email').value.trim();
            const phone = waInput.value.replace(/\D/g, '');
            
            // Validações
            if (nome.split(' ').length < 2 || nome.length < 5) { document.getElementById('erro-nome').classList.remove('hidden'); return; }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { alert("E-mail inválido"); return; }
            if (phone.length < 10 || phone.length > 11) { document.getElementById('erro-tel').classList.remove('hidden'); return; }

            const btn = document.getElementById('btn-submit');
            btn.innerHTML = "Liberando..."; btn.disabled = true;

            window.dataLayer.push({'event': 'lead_capture_vip', 'lead_name': nome, 'lead_email': email, 'lead_phone': phone});
            window.location.href = "https://cursos.comotocarukulele.com/ukulele-fundamental/ev-semana-grupo-vip/prematricula-confirmada";
        }
    </script>
