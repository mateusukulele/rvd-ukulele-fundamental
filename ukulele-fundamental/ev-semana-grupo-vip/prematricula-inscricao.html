<body class="font-sans text-slate-700 bg-brand-light antialiased">
    <noscript><iframe src="https://serversidegtm.comotocarukulele.com/ns.html?id=GTM-PDH6QGB2" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <main id="main-content" class="w-full overflow-x-hidden">
        </main>

    <div id="capture-modal" class="fixed inset-0 z-[9999] hidden items-center justify-center bg-brand-dark/95 px-4 backdrop-blur-md opacity-0 transition-opacity duration-300">
        <div class="w-full max-w-md rounded-[40px] bg-white p-8 shadow-2xl transition-transform" id="capture-content">
            <h3 class="font-display text-2xl font-extrabold text-brand-dark mb-2 text-center">Falta muito pouco!</h3>
            <p class="text-slate-500 text-sm mb-6 text-center">Preencha seus dados para receber o link.</p>
            <form id="lead-form" class="space-y-4">
                <input required type="text" id="lead-nome" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200" placeholder="Nome Completo">
                <input required type="email" id="lead-email" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200" placeholder="Seu melhor e-mail">
                <input required type="text" id="lead-whatsapp" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200" placeholder="(00) 00000-0000">
                <button type="submit" id="btn-submit" class="w-full bg-brand-cta text-white py-4 rounded-2xl font-bold uppercase">Liberar Vaga</button>
            </form>
        </div>
    </div>

    <script>
        // Animação de entrada
        function iniciarCascata() {
            const sections = document.querySelectorAll('.cascade-section');
            sections.forEach((sec, i) => { setTimeout(() => { sec.classList.add('animate-reveal'); }, i * 120); });
        }
        window.onload = iniciarCascata;

        // Modal
        function abrirCaptura() { const m = document.getElementById('capture-modal'); m.classList.remove('hidden'); m.classList.add('flex'); setTimeout(() => m.classList.remove('opacity-0'), 10); }

        // Máscara Telefone (Aceita 10 ou 11 dígitos)
        const waInput = document.getElementById('lead-whatsapp');
        waInput.addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.substring(0, 11);
            if (v.length > 2) v = '(' + v.substring(0,2) + ') ' + v.substring(2);
            if (v.length > 9) v = v.substring(0,10) + '-' + v.substring(10);
            e.target.value = v;
        });

        // Submit
        document.getElementById('lead-form').onsubmit = function(event) {
            event.preventDefault();
            const nome = document.getElementById('lead-nome').value.trim();
            const email = document.getElementById('lead-email').value.trim();
            const phone = waInput.value.replace(/\D/g, '');

            if (nome.split(' ').length < 2) { alert('Por favor, insira nome e sobrenome.'); return; }
            if (phone.length < 10) { alert('Número de WhatsApp inválido.'); return; }

            document.getElementById('btn-submit').innerHTML = "Redirecionando...";
            
            window.dataLayer.push({
                'event': 'lead_capture_vip',
                'lead_name': nome,
                'lead_email': email,
                'lead_phone': phone
            });

            window.location.href = "https://cursos.comotocarukulele.com/ukulele-fundamental/ev-semana-grupo-vip/prematricula-confirmada";
        };
    </script>
